name: build

on:
  push:
    branches:
      - master
      - main
  pull_request:
  release:
    types:
      - published

jobs:
  base:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build base Java artifact
        run: mvn -B -Dmaven.repo.local=${{ github.workspace }}/.m2/repository -Djavacpp.compiler.skip=true install

      - name: Upload base Maven outputs
        uses: actions/upload-artifact@v4
        with:
          name: maven-base
          path: |
            target/*.jar

      - name: Upload base Maven slice
        uses: actions/upload-artifact@v4
        with:
          name: m2-base
          path: .m2/repository/com/behemiron/engine/behemiron-effekseer

  build-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x86_64
            os: windows-latest
            configurePreset: win-x64
            buildPreset: build-win-release
            buildDir: build/win-x64
          - id: linux-x86_64
            os: ubuntu-latest
            configurePreset: linux-x64
            buildPreset: build-linux-release
            buildDir: build/linux-x64
          - id: macosx-x86_64
            os: macos-13
            configurePreset: macos-x64
            buildPreset: build-macos-x64-release
            buildDir: build/macos-x64
          - id: macosx-arm64
            os: macos-latest
            configurePreset: macos-arm64
            buildPreset: build-macos-arm64-release
            buildDir: build/macos-arm64
          - id: android-arm64
            os: ubuntu-latest
            configurePreset: android-arm64
            buildPreset: build-android-release
            buildDir: build/android-arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Select Windows MSVC toolchain
        if: runner.os == 'Windows'
        run: |
          echo "CC=cl" >> "$GITHUB_ENV"
          echo "CXX=cl" >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake libegl1-mesa-dev libgles2-mesa-dev libgl-dev libx11-dev libx11-xcb-dev libxcb1-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja cmake

      - name: Install Vulkan SDK
        if: matrix.id == 'windows-x86_64' || matrix.id == 'linux-x86_64' || matrix.id == 'macosx-x86_64' || matrix.id == 'macosx-arm64'
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          vulkan_version: 1.3.290.0

      - name: Set up Android NDK
        if: matrix.id == 'android-arm64'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Export Android NDK environment
        if: matrix.id == 'android-arm64'
        run: |
          echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: cmake --preset ${{ matrix.configurePreset }}

      - name: Build native library
        run: cmake --build --preset ${{ matrix.buildPreset }}

      - name: Install native artifacts into cppbuild
        run: bash ./cppbuild.sh ${{ matrix.id }} ${{ matrix.buildDir }}

      - name: Build JavaCPP classifier artifact
        run: |
          mvn_args=(
            -B
            -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
            -Djavacpp.platform=${{ matrix.id }}
          )
          if [[ "${{ matrix.id }}" == "android-arm64" ]]; then
            mvn_args+=("-Dplatform.root=${ANDROID_NDK}/")
            mvn_args+=("-Dplatform.compiler=toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++")
          fi
          mvn "${mvn_args[@]}" process-classes jar:jar@platform-jar
          classifier_jar="$(find target -maxdepth 1 -type f -name "*-${{ matrix.id }}.jar" -print -quit)"
          if [[ -z "$classifier_jar" ]]; then
            echo "classifier jar for ${{ matrix.id }} was not produced"
            exit 1
          fi
          mvn "${mvn_args[@]}" install:install-file -Dfile="$classifier_jar" -DpomFile=pom.xml -Dclassifier=${{ matrix.id }}

      - name: Upload platform Maven outputs
        uses: actions/upload-artifact@v4
        with:
          name: maven-${{ matrix.id }}
          path: |
            target/*-${{ matrix.id }}.jar

      - name: Upload platform Maven slice
        uses: actions/upload-artifact@v4
        with:
          name: m2-${{ matrix.id }}
          path: .m2/repository/com/behemiron/engine/behemiron-effekseer

  platform-bundle:
    needs:
      - base
      - build-platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download local Maven slices
        uses: actions/download-artifact@v4
        with:
          pattern: m2-*
          merge-multiple: true
          path: .m2/repository/com/behemiron/engine

      - name: Build platform pom
        run: mvn -B -Dmaven.repo.local=${{ github.workspace }}/.m2/repository -f platform/pom.xml install -DskipTests

      - name: Upload platform Maven slice
        uses: actions/upload-artifact@v4
        with:
          name: m2-platform
          path: .m2/repository/com/behemiron/engine/behemiron-effekseer-platform
