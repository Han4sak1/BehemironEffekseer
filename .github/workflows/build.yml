name: build

on:
  push:
    branches:
      - master
      - main
  pull_request:
  release:
    types:
      - published

jobs:
  base:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Resolve Maven local repository path
        id: base-maven-repo
        run: |
          repo_local="${PWD}/.m2/repository"
          echo "repo_local=$repo_local" >> "$GITHUB_OUTPUT"

      - name: Build base Java artifact
        run: mvn -B -Dmaven.repo.local="${{ steps.base-maven-repo.outputs.repo_local }}" -Djavacpp.compiler.skip=true install

      - name: Verify base Maven slice
        run: |
          test -d .m2/repository/com/behemiron/engine/behemiron-effekseer
          find .m2/repository/com/behemiron/engine/behemiron-effekseer -maxdepth 2 -type f | sort

      - name: Upload base Maven outputs
        uses: actions/upload-artifact@v4
        with:
          name: maven-base
          path: |
            target/*.jar

      - name: Upload base Maven slice
        uses: actions/upload-artifact@v4
        with:
          name: m2-base
          path: .m2/repository/com/behemiron/engine/behemiron-effekseer

  build-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x86_64
            os: windows-latest
            configurePreset: win-x64
            buildPreset: build-win-release
            buildDir: build/win-x64
          - id: linux-x86_64
            os: ubuntu-latest
            configurePreset: linux-x64
            buildPreset: build-linux-release
            buildDir: build/linux-x64
          - id: macosx-x86_64
            os: macos-15-intel
            configurePreset: macos-x64
            buildPreset: build-macos-x64-release
            buildDir: build/macos-x64
          - id: macosx-arm64
            os: macos-latest
            configurePreset: macos-arm64
            buildPreset: build-macos-arm64-release
            buildDir: build/macos-arm64
          - id: android-arm64
            os: ubuntu-latest
            configurePreset: android-arm64
            buildPreset: build-android-release
            buildDir: build/android-arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Resolve Maven local repository path
        id: platform-maven-repo
        run: |
          repo_local="${PWD}/.m2/repository"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            repo_local="$(cygpath -am "$repo_local")"
          fi
          echo "repo_local=$repo_local" >> "$GITHUB_OUTPUT"

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Select Windows MSVC toolchain
        if: runner.os == 'Windows'
        run: |
          echo "CC=cl" >> "$GITHUB_ENV"
          echo "CXX=cl" >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake libegl1-mesa-dev libgles2-mesa-dev libgl-dev libx11-dev libx11-xcb-dev libxcb1-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja cmake

      - name: Install Vulkan SDK
        if: matrix.id == 'windows-x86_64' || matrix.id == 'linux-x86_64' || matrix.id == 'macosx-x86_64' || matrix.id == 'macosx-arm64'
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          vulkan_version: 1.3.290.0

      - name: Set up Android NDK
        if: matrix.id == 'android-arm64'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Export Android NDK environment
        if: matrix.id == 'android-arm64'
        run: |
          echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: cmake --preset ${{ matrix.configurePreset }}

      - name: Build native library
        run: cmake --build --preset ${{ matrix.buildPreset }}

      - name: Install native artifacts into cppbuild
        run: bash ./cppbuild.sh ${{ matrix.id }} ${{ matrix.buildDir }}

      - name: Build JavaCPP classifier artifact
        run: |
          mvn_args=(
            -B
            "-Dmaven.repo.local=${{ steps.platform-maven-repo.outputs.repo_local }}"
            "-Djavacpp.platform=${{ matrix.id }}"
          )
          if [[ "${{ matrix.id }}" == "android-arm64" ]]; then
            mvn_args+=("-Djavacpp.platform.root=${ANDROID_NDK}/")
            mvn_args+=("-Djavacpp.platform.compiler=toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++")
          fi
          mvn "${mvn_args[@]}" process-classes
          resource_dir="com/behemiron/engine/external/effect/effekseer/internal/raw/${{ matrix.id }}"
          case "${{ matrix.id }}" in
            windows-x86_64)
              jni_native="jniBehemironEffekseer.dll"
              core_native_entry="behemiron_effekseer.dll"
              core_native_source="cppbuild/${{ matrix.id }}/bin/behemiron_effekseer.dll"
              core_native_target="target/native/${resource_dir}/${core_native_entry}"
              ;;
            linux-x86_64|android-arm64)
              jni_native="libjniBehemironEffekseer.so"
              core_native_entry="libbehemiron_effekseer.so"
              core_native_source="cppbuild/${{ matrix.id }}/lib/libbehemiron_effekseer.so"
              core_native_target="target/native/${resource_dir}/${core_native_entry}"
              ;;
            macosx-x86_64|macosx-arm64)
              jni_native="libjniBehemironEffekseer.dylib"
              core_native_entry="libbehemiron_effekseer.dylib"
              core_native_source="cppbuild/${{ matrix.id }}/lib/libbehemiron_effekseer.dylib"
              core_native_target="target/native/${resource_dir}/${core_native_entry}"
              ;;
            *)
              echo "unsupported platform verification target: ${{ matrix.id }}"
              exit 1
              ;;
          esac
          if [[ ! -f "$core_native_source" ]]; then
            echo "Expected core native library at $core_native_source, but it was not found"
            exit 1
          fi
          mkdir -p "$(dirname "$core_native_target")"
          cp "$core_native_source" "$core_native_target"
          mvn "${mvn_args[@]}" jar:jar@platform-jar
          classifier_jar="$(find target -maxdepth 1 -type f -name "*-${{ matrix.id }}.jar" -print -quit)"
          if [[ -z "$classifier_jar" ]]; then
            echo "classifier jar for ${{ matrix.id }} was not produced"
            exit 1
          fi
          echo "Produced classifier jar: $classifier_jar"
          jar_listing="$(mktemp)"
          jar tf "$classifier_jar" | tee "$jar_listing"

          if ! grep -Fq "${resource_dir}/${jni_native}" "$jar_listing"; then
            echo "Expected generated JNI library under ${resource_dir}, but it was not found in:"
            cat "$jar_listing"
            rm -f "$jar_listing"
            exit 1
          fi

          if ! grep -Fq "${resource_dir}/${core_native_entry}" "$jar_listing"; then
            echo "Expected core native library ${core_native_entry} under ${resource_dir}, but it was not found in:"
            cat "$jar_listing"
            rm -f "$jar_listing"
            exit 1
          fi

          rm -f "$jar_listing"
          mvn "${mvn_args[@]}" install:install-file -Dfile="$classifier_jar" -DpomFile=pom.xml -Dclassifier=${{ matrix.id }}

      - name: Verify platform Maven slice
        run: |
          test -d .m2/repository/com/behemiron/engine/behemiron-effekseer
          find .m2/repository/com/behemiron/engine/behemiron-effekseer -maxdepth 2 -type f | sort

      - name: Upload platform Maven outputs
        uses: actions/upload-artifact@v4
        with:
          name: maven-${{ matrix.id }}
          path: |
            target/*-${{ matrix.id }}.jar

      - name: Upload platform Maven slice
        uses: actions/upload-artifact@v4
        with:
          name: m2-${{ matrix.id }}
          path: .m2/repository/com/behemiron/engine/behemiron-effekseer

  platform-bundle:
    needs:
      - base
      - build-platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Resolve Maven local repository path
        id: bundle-maven-repo
        run: |
          repo_local="${PWD}/.m2/repository"
          echo "repo_local=$repo_local" >> "$GITHUB_OUTPUT"

      - name: Download base and classifier jars
        uses: actions/download-artifact@v4
        with:
          pattern: maven-*
          merge-multiple: true
          path: target/prebuilt-artifacts

      - name: Normalize prebuilt artifact layout
        run: |
          mkdir -p target/prebuilt-artifacts-flat
          find target/prebuilt-artifacts -type f -name "*.jar" -exec cp {} target/prebuilt-artifacts-flat/ \;

      - name: Install base and classifier jars into local Maven repository
        run: |
          project_version="$(sed -n 's#.*<version>\(.*\)</version>.*#\1#p' pom.xml | head -n 1)"
          base_jar="target/prebuilt-artifacts-flat/behemiron-effekseer-${project_version}.jar"

          if [[ ! -f "$base_jar" ]]; then
            echo "Base jar not found: $base_jar"
            find target/prebuilt-artifacts-flat -maxdepth 1 -type f | sort
            exit 1
          fi

          mvn -B \
            -Dmaven.repo.local="${{ steps.bundle-maven-repo.outputs.repo_local }}" \
            install:install-file \
            -Dfile="$base_jar" \
            -DpomFile=pom.xml

          for classifier in windows-x86_64 linux-x86_64 macosx-x86_64 macosx-arm64 android-arm64; do
            classifier_jar="target/prebuilt-artifacts-flat/behemiron-effekseer-${project_version}-${classifier}.jar"
            if [[ ! -f "$classifier_jar" ]]; then
              echo "Classifier jar not found: $classifier_jar"
              find target/prebuilt-artifacts-flat -maxdepth 1 -type f | sort
              exit 1
            fi

            mvn -B \
              -Dmaven.repo.local="${{ steps.bundle-maven-repo.outputs.repo_local }}" \
              install:install-file \
              -Dfile="$classifier_jar" \
              -DpomFile=pom.xml \
              -Dclassifier="${classifier}"
          done

      - name: Build platform pom
        run: mvn -B -Dmaven.repo.local="${{ steps.bundle-maven-repo.outputs.repo_local }}" -f platform/pom.xml install -DskipTests

      - name: Upload platform Maven slice
        uses: actions/upload-artifact@v4
        with:
          name: m2-platform
          path: .m2/repository/com/behemiron/engine/behemiron-effekseer-platform

  publish-maven-central-snapshot:
    if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
    needs:
      - platform-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Validate publish secrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          for secret_name in MAVEN_CENTRAL_USERNAME MAVEN_CENTRAL_PASSWORD MAVEN_GPG_PRIVATE_KEY MAVEN_GPG_PASSPHRASE; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required secret: $secret_name"
              exit 1
            fi
          done

      - name: Set up JDK for Maven Central
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Resolve Maven local repository path
        id: publish-maven-repo
        run: |
          repo_local="${PWD}/.m2/repository"
          echo "repo_local=$repo_local" >> "$GITHUB_OUTPUT"

      - name: Download classifier jars
        uses: actions/download-artifact@v4
        with:
          pattern: maven-*
          merge-multiple: true
          path: target/prebuilt-artifacts

      - name: Normalize prebuilt classifier layout
        run: |
          mkdir -p target/prebuilt-artifacts-flat
          find target/prebuilt-artifacts -type f -name "*.jar" -exec cp {} target/prebuilt-artifacts-flat/ \;

      - name: Install base and classifier jars into local Maven repository
        run: |
          project_version="$(sed -n 's#.*<version>\(.*\)</version>.*#\1#p' pom.xml | head -n 1)"
          base_jar="target/prebuilt-artifacts-flat/behemiron-effekseer-${project_version}.jar"

          if [[ ! -f "$base_jar" ]]; then
            echo "Base jar not found: $base_jar"
            find target/prebuilt-artifacts-flat -maxdepth 1 -type f | sort
            exit 1
          fi

          mvn -B \
            -Dmaven.repo.local="${{ steps.publish-maven-repo.outputs.repo_local }}" \
            install:install-file \
            -Dfile="$base_jar" \
            -DpomFile=pom.xml

          for classifier in windows-x86_64 linux-x86_64 macosx-x86_64 macosx-arm64 android-arm64; do
            classifier_jar="target/prebuilt-artifacts-flat/behemiron-effekseer-${project_version}-${classifier}.jar"
            if [[ ! -f "$classifier_jar" ]]; then
              echo "Classifier jar not found: $classifier_jar"
              find target/prebuilt-artifacts-flat -maxdepth 1 -type f | sort
              exit 1
            fi

            mvn -B \
              -Dmaven.repo.local="${{ steps.publish-maven-repo.outputs.repo_local }}" \
              install:install-file \
              -Dfile="$classifier_jar" \
              -DpomFile=pom.xml \
              -Dclassifier="${classifier}"
          done

      - name: Detect snapshot version
        id: snapshot-version
        run: |
          if grep -q -- "-SNAPSHOT" pom.xml; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "Current project version is not a snapshot. Skip snapshot publish."
          fi

      - name: Publish base artifact and classifier jars to Maven Central
        if: steps.snapshot-version.outputs.eligible == 'true'
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn -B \
            -Dmaven.repo.local="${{ steps.publish-maven-repo.outputs.repo_local }}" \
            -DskipTests \
            -Djavacpp.compiler.skip=true \
            -Dbehemiron.prebuilt.directory="${PWD}/target/prebuilt-artifacts-flat" \
            -Dbehemiron.attach.prebuilt.classifiers=true \
            -Dbehemiron.central.publish=true \
            deploy

      - name: Publish platform bundle to Maven Central
        if: steps.snapshot-version.outputs.eligible == 'true'
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn -B \
            -Dmaven.repo.local="${{ steps.publish-maven-repo.outputs.repo_local }}" \
            -DskipTests \
            -Dbehemiron.central.publish=true \
            -f platform/pom.xml \
            deploy

  publish-maven-central-release:
    if: ${{ github.event_name == 'release' }}
    needs:
      - platform-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Validate publish secrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          for secret_name in MAVEN_CENTRAL_USERNAME MAVEN_CENTRAL_PASSWORD MAVEN_GPG_PRIVATE_KEY MAVEN_GPG_PASSPHRASE; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required secret: $secret_name"
              exit 1
            fi
          done

      - name: Set up JDK for Maven Central
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Resolve Maven local repository path
        id: publish-release-maven-repo
        run: |
          repo_local="${PWD}/.m2/repository"
          echo "repo_local=$repo_local" >> "$GITHUB_OUTPUT"

      - name: Download classifier jars
        uses: actions/download-artifact@v4
        with:
          pattern: maven-*
          merge-multiple: true
          path: target/prebuilt-artifacts

      - name: Normalize prebuilt classifier layout
        run: |
          mkdir -p target/prebuilt-artifacts-flat
          find target/prebuilt-artifacts -type f -name "*.jar" -exec cp {} target/prebuilt-artifacts-flat/ \;

      - name: Install base and classifier jars into local Maven repository
        run: |
          project_version="$(sed -n 's#.*<version>\(.*\)</version>.*#\1#p' pom.xml | head -n 1)"
          base_jar="target/prebuilt-artifacts-flat/behemiron-effekseer-${project_version}.jar"

          if [[ ! -f "$base_jar" ]]; then
            echo "Base jar not found: $base_jar"
            find target/prebuilt-artifacts-flat -maxdepth 1 -type f | sort
            exit 1
          fi

          mvn -B \
            -Dmaven.repo.local="${{ steps.publish-release-maven-repo.outputs.repo_local }}" \
            install:install-file \
            -Dfile="$base_jar" \
            -DpomFile=pom.xml

          for classifier in windows-x86_64 linux-x86_64 macosx-x86_64 macosx-arm64 android-arm64; do
            classifier_jar="target/prebuilt-artifacts-flat/behemiron-effekseer-${project_version}-${classifier}.jar"
            if [[ ! -f "$classifier_jar" ]]; then
              echo "Classifier jar not found: $classifier_jar"
              find target/prebuilt-artifacts-flat -maxdepth 1 -type f | sort
              exit 1
            fi

            mvn -B \
              -Dmaven.repo.local="${{ steps.publish-release-maven-repo.outputs.repo_local }}" \
              install:install-file \
              -Dfile="$classifier_jar" \
              -DpomFile=pom.xml \
              -Dclassifier="${classifier}"
          done

      - name: Refuse snapshot version on release workflow
        run: |
          if grep -q -- "-SNAPSHOT" pom.xml; then
            echo "Release workflow requires a non-SNAPSHOT project version."
            exit 1
          fi

      - name: Publish base artifact and classifier jars to Maven Central
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn -B \
            -Dmaven.repo.local="${{ steps.publish-release-maven-repo.outputs.repo_local }}" \
            -DskipTests \
            -Djavacpp.compiler.skip=true \
            -Dbehemiron.prebuilt.directory="${PWD}/target/prebuilt-artifacts-flat" \
            -Dbehemiron.attach.prebuilt.classifiers=true \
            -Dbehemiron.central.publish=true \
            deploy

      - name: Publish platform bundle to Maven Central
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn -B \
            -Dmaven.repo.local="${{ steps.publish-release-maven-repo.outputs.repo_local }}" \
            -DskipTests \
            -Dbehemiron.central.publish=true \
            -f platform/pom.xml \
            deploy
